<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLO Pot Calculator</title> 
    <style>
        main {margin: 2% auto 2% auto;}
        h1 {text-align: center; font-size: xx-large; font-weight: bolder;}
        h2 {text-align: center; font-size: x-large;}
        select {text-align: center; font-size: x-large;}
        output {font-size: x-large; color: crimson; font-weight: bold;}
        form {text-align: center; font-size: large;}
        input {text-align: center; font-size: larger;}
        input.formButton {font-size: x-large;}
    </style>   
</head>
<body>
<main>
    <h1>PLO Pot Calculator</h1>
    <h2>Select Game:<br> 
        <select id="game" onchange="updateGame()">        
        <option value="0" selected>1-2 PLO</option>
        <option value="1">5-5 PLO</option>
        <option value="2">5-10 PLO</option>
        <option value="3">10-25 PLO</option>
    </select></h2>
    <h2>Amount in Pot: <output id="potTotal"></output></h2>
    <h2>Pot Bet: <output id="potBet"></output></h2>     
    <form id="betField">
    <p><b>Bet Amount:</b></p>
        <input type="number" id="bet" name="bet" value="5" step="5" min="5" required>
    <p><b>Amount previously committed:</b></p>   
        <input type="number" id="previous" name="previous" value="0" step="5" min="0" max="0" onchange="previousBet()" required>
    <p></p>    
        <input class="formButton" type="button" onclick="betAmount()" value="Bet/Call">
        <input class="formButton" type="button" onclick="potBet()" value="Pot">        
    <p></p>    
        <input class="formButton" type="button" onclick="nextStreet()" value="Next Street">
        <input class="formButton" type="button" onclick="endHand()" value="End Hand">
    </form>  
</main>
<script>
let last = 5;
let total = 5;
let pot = 15;
let g = document.getElementById("game").value;
document.getElementById("potBet").innerHTML = pot;
document.getElementById("potTotal").innerHTML = total;
document.getElementById("bet").value = last;
document.getElementById("bet").min = last;
document.getElementById("bet").max = pot;
document.getElementById("previous").value = 0;
document.getElementById("previous").max = last;

function updateGame(){    
    g = document.getElementById("game").value;    
    if(g == 0){
        total = 5;
        pot = 15;
        last = 5;
        document.getElementById("potBet").innerHTML = pot;
        document.getElementById("potTotal").innerHTML = total;
        document.getElementById("bet").value = last;
        document.getElementById("bet").min = last;
        document.getElementById("bet").max = pot;
        document.getElementById("previous").value = 0;        
        document.getElementById("previous").max = 0;
    }else if(g == 1){
        total = 10;
        pot = 20;
        last = 5;
        document.getElementById("potBet").innerHTML = pot;
        document.getElementById("potTotal").innerHTML = total;
        document.getElementById("bet").value = last;
        document.getElementById("bet").min = last;
        document.getElementById("bet").max = pot;
        document.getElementById("previous").value = 0;        
        document.getElementById("previous").max = 0;
    }else if(g == 2){
        total = 15;
        pot = 35;
        last = 10;
        document.getElementById("potBet").innerHTML = pot;
        document.getElementById("potTotal").innerHTML = total;
        document.getElementById("bet").value = last;
        document.getElementById("bet").min = last;
        document.getElementById("bet").max = pot;
        document.getElementById("previous").value = 0;        
        document.getElementById("previous").max = 0;
    }else{
        total = 35;
        pot = 85;
        last = 25;
        document.getElementById("potBet").innerHTML = pot;
        document.getElementById("potTotal").innerHTML = total;
        document.getElementById("bet").value = last;
        document.getElementById("bet").min = last;
        document.getElementById("bet").max = pot;
        document.getElementById("previous").value = 0;
        document.getElementById("previous").max = 0;
    }
}

function previousBet(){    
    document.getElementById("potBet").innerHTML = pot - document.getElementById("previous").value; 
}

function betAmount(){    
    last = document.getElementById("bet").value - document.getElementById("previous").value;
    total = +total + +last;
    pot = +total + (+last*2)
    document.getElementById("potBet").innerHTML = pot;
    document.getElementById("potTotal").innerHTML = total; 
    document.getElementById("bet").value = last;
    document.getElementById("bet").min = last;
    document.getElementById("bet").max = pot;
    document.getElementById("previous").value = 0;
    document.getElementById("previous").max = last;     
}

function potBet(){
    last = pot - document.getElementById("previous").value;
    total = +total + +last;
    pot = +total + (+last*2);
    document.getElementById("potBet").innerHTML = pot;
    document.getElementById("potTotal").innerHTML = total;
    document.getElementById("bet").value = last;
    document.getElementById("bet").min = last;
    document.getElementById("bet").max = pot;
    document.getElementById("previous").value = 0;
    document.getElementById("previous").max = last;
}

function nextStreet(){
    if(g == 2){
        last = 10;
    }else if(g == 3){
        last = 25;
    }else{
        last = 5;
    }   
    pot = total;
    document.getElementById("potBet").innerHTML = pot;
    document.getElementById("potTotal").innerHTML = total;
    document.getElementById("bet").value = last;
    document.getElementById("bet").min = last;
    document.getElementById("bet").max = pot;
    document.getElementById("previous").value = 0;
    document.getElementById("previous").max = 0;
}

function endHand(){
    g = document.getElementById("game").value;       
    if(g == 0){
        total = 5;
        pot = 15;
        last = 5;
        document.getElementById("potBet").innerHTML = pot;
        document.getElementById("potTotal").innerHTML = total;
        document.getElementById("bet").value = last;
        document.getElementById("bet").min = last;
        document.getElementById("bet").max = pot;
        document.getElementById("previous").value = 0;
        document.getElementById("previous").max = 0;
    }else if(g == 1){
        total = 10;
        pot = 20;
        last = 5;
        document.getElementById("potBet").innerHTML = pot;
        document.getElementById("potTotal").innerHTML = total;
        document.getElementById("bet").value = last;
        document.getElementById("bet").min = last;
        document.getElementById("bet").max = pot;
        document.getElementById("previous").value = 0;
        document.getElementById("previous").max = 0;
    }else if(g == 2){
        total = 15;
        pot = 35;
        last = 10;
        document.getElementById("potBet").innerHTML = pot;
        document.getElementById("potTotal").innerHTML = total;
        document.getElementById("bet").value = last;
        document.getElementById("bet").min = last;
        document.getElementById("bet").max = pot;
        document.getElementById("previous").value = 0;
        document.getElementById("previous").max = 0;
    }else{
        total = 35;
        pot = 85;
        last = 25;
        document.getElementById("potBet").innerHTML = pot;
        document.getElementById("potTotal").innerHTML = total;
        document.getElementById("bet").value = last;
        document.getElementById("bet").min = last;
        document.getElementById("bet").max = pot;
        document.getElementById("previous").value = 0;
        document.getElementById("previous").max = 0;
    }
}
</script>
</body>
</html>
